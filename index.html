<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IDLEB X - خدمات التواصل الاجتماعي الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2? Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* أنيميشن الخلفية */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,0,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* شريط التنقل */
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
            50% { box-shadow: 0 0 0 10px rgba(255,0,0,0); }
        }

        .logo-text h1 {
            font-size: 28px;
            background: linear-gradient(45deg, #fff, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 12px;
            color: #ff6666;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #ff4444;
        }

        .telegram-btn {
            background: linear-gradient(135deg, #0088cc, #006699);
            padding: 8px 20px;
            border-radius: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* بطاقة الملف الشخصي */
        .profile-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff4444;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        .avatar i {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #ff4444;
            border-radius: 50%;
            padding: 8px;
            font-size: 12px;
        }

        .profile-card h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .profile-card .title {
            color: #ff8888;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat .number {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
        }

        .stat .label {
            font-size: 12px;
            color: #aaa;
        }

        /* شبكة الخدمات */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .service-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .service-card:hover {
            border-color: #ff4444;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,0,0,0.2);
        }

        .service-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .service-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .service-card p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .service-status {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 12px;
        }

        /* مودال الإدخال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0a0a0a);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #ff4444;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #ff4444;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #ff4444;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            flex: 1;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,0,0,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 3000;
            animation: slideUp 0.3s ease;
            border-right: 4px solid #ff4444;
        }

        .toast.success {
            border-right-color: #00ff00;
        }

        .toast.error {
            border-right-color: #ff0000;
        }

        @keyframes slideUp {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 40px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-links a {
            color: #fff;
            font-size: 24px;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: #ff4444;
            transform: translateY(-3px);
        }

        /* تحميل */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="logo-container">
            <div class="logo-icon">
                <i class="fas fa-crown"></i>
            </div>
            <div class="logo-text">
                <h1>IDLEB X</h1>
                <p>الخدمات الاحترافية</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="#" class="telegram-btn" id="telegramLink">
                <i class="fab fa-telegram"></i>
                @IDLEBX
            </a>
        </div>
    </nav>

    <div class="container">
        <!-- بطاقة الملف الشخصي -->
        <div class="profile-card">
            <div class="avatar">
                <img src="https://i.postimg.cc/jdP53CWN/IMG-20260414-004649-056.jpg" alt="IDLEB X">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>IDLEB X</h2>
            <div class="title">مطور ومقدم خدمات سوشيال ميديا</div>
            <div class="stats">
                <div class="stat">
                    <div class="number">15K+</div>
                    <div class="label">خدمة منجزة</div>
                </div>
                <div class="stat">
                    <div class="number">98%</div>
                    <div class="label">رضا العملاء</div>
                </div>
                <div class="stat">
                    <div class="number">24/7</div>
                    <div class="label">الدعم الفني</div>
                </div>
            </div>
        </div>

        <!-- شبكة الخدمات -->
        <div class="services-grid" id="servicesGrid">
            <!-- سيتم تعبئة الخدمات بواسطة JS -->
        </div>
    </div>

    <footer class="footer">
        <div class="social-links">
            <a href="https://t.me/idlebx2" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>
        <p>© 2026 IDLEB X - جميع الحقوق محفوظة</p>
        <p style="font-size: 12px; margin-top: 10px;">@IDLEBX | المطور</p>
    </footer>

    <!-- مودال الإدخال -->
    <div class="modal" id="inputModal">
        <div class="modal-content">
            <h3 id="modalTitle">أدخل الرابط</h3>
            <input type="text" id="modalInput" placeholder="أدخل الرابط أو اسم المستخدم هنا...">
            <div class="modal-buttons">
                <button class="btn btn-primary" id="submitBtn">تنفيذ <i class="fas fa-arrow-left"></i></button>
                <button class="btn btn-secondary" id="cancelBtn">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // الخدمات المتاحة
        const services = [
            { id: 1, name: "رشق مشاهدات انستقرام", icon: "fab fa-instagram", desc: "زيادة مشاهدات المنشورات", type: "link", endpoint: "https://leofame.com/ar/free-instagram-views", quantity: 200 },
            { id: 2, name: "رشق لايكات انستقرام", icon: "fas fa-heart", desc: "زيادة إعجابات المنشورات", type: "link", endpoint: "https://leofame.com/ar/free-instagram-likes", quantity: null },
            { id: 3, name: "رشق حفظ | saves انستقرام", icon: "fas fa-bookmark", desc: "زيادة حفظ المنشورات", type: "link", endpoint: "https://leofame.com/ar/free-instagram-saves", quantity: 30 },
            { id: 4, name: "رشق مشاهدات ستوري انستقرام", icon: "fas fa-eye", desc: "زيادة مشاهدات القصص", type: "user", endpoint: "https://leofame.com/ar/free-instagram-story-views", quantity: null },
            { id: 5, name: "رشق لايكات تيك توك", icon: "fab fa-tiktok", desc: "زيادة إعجابات التيك توك", type: "link", endpoint: "https://leofame.com/ar/free-tiktok-likes", quantity: 100 },
            { id: 6, name: "رشق مشاهدات تيك توك", icon: "fas fa-play", desc: "زيادة مشاهدات التيك توك", type: "link", endpoint: "https://leofame.com/ar/free-tiktok-views", quantity: null }
        ];

        let currentService = null;
        let currentModalCallback = null;

        // عرض الإشعارات
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                ${message}
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // عرض مودال الإدخال
        function showInputModal(title, placeholder, callback) {
            const modal = document.getElementById('inputModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalInput = document.getElementById('modalInput');
            
            modalTitle.textContent = title;
            modalInput.placeholder = placeholder;
            modalInput.value = '';
            currentModalCallback = callback;
            
            modal.style.display = 'flex';
            
            // التركيز على الحقل
            setTimeout(() => modalInput.focus(), 100);
        }

        // إغلاق المودال
        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
            currentModalCallback = null;
        }

        // تنفيذ طلب API
        async function executeService(service, input) {
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<div class="loading"></div> جاري التنفيذ...';
            submitBtn.disabled = true;
            
            try {
                // جلب الصفحة للحصول على الكوكيز والتوكن
                const initRes = await fetch(service.endpoint, {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36'
                    }
                });
                
                const cookies = initRes.headers.get('set-cookie') || '';
                const html = await initRes.text();
                
                // استخراج التوكن من الـ HTML
                const tokenMatch = html.match(/name="token" value="([^"]+)"/);
                const token = tokenMatch ? tokenMatch[1] : '';
                
                if (!token) {
                    throw new Error('لم نتمكن من الحصول على التوكن');
                }
                
                // تحضير البيانات
                const formData = new URLSearchParams();
                formData.append('token', token);
                formData.append('timezone_offset', 'Asia/Baghdad');
                formData.append('timezone_offset_2', 'abcd');
                formData.append('free_link', input);
                if (service.quantity) {
                    formData.append('quantity', service.quantity.toString());
                }
                formData.append('speed', '-1');
                
                // إرسال الطلب
                const response = await fetch(`${service.endpoint}?api=1`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'User-Agent': 'Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: formData
                });
                
                const result = await response.text();
                
                if (result.includes('success') || result.includes('successfully')) {
                    showToast(`✅ تم بنجاح إرسال الطلب إلى: ${input}`, 'success');
                } else if (result.includes('24') || result.includes('hours')) {
                    showToast(`⚠️ حاول بعد 24 ساعة للرابط: ${input}`, 'error');
                } else {
                    showToast(`⚠️ حدث خطأ: لم يتم قبول الطلب`, 'error');
                }
                
            } catch (error) {
                console.error(error);
                showToast(`❌ حدث خطأ: ${error.message}`, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                closeModal();
            }
        }

        // معالجة اختيار الخدمة
        function handleServiceClick(service) {
            currentService = service;
            
            let title = '';
            let placeholder = '';
            
            if (service.type === 'link') {
                title = `أدخل رابط ${service.name}`;
                placeholder = 'مثال: https://www.instagram.com/p/... أو https://www.tiktok.com/@.../video/...';
            } else {
                title = `أدخل اسم المستخدم لـ ${service.name}`;
                placeholder = 'مثال: username (بدون @)';
            }
            
            showInputModal(title, placeholder, async (input) => {
                if (!input.trim()) {
                    showToast('الرجاء إدخال رابط صحيح', 'error');
                    return;
                }
                await executeService(service, input);
            });
        }

        // عرض الخدمات في الواجهة
        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';
            
            services.forEach(service => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.onclick = () => handleServiceClick(service);
                
                card.innerHTML = `
                    <div class="service-icon">
                        <i class="${service.icon}"></i>
                    </div>
                    <h3>${service.name}</h3>
                    <p>${service.desc}</p>
                    <span class="service-status">
                        <i class="fas fa-circle" style="color: #00ff00; font-size: 8px;"></i>
                        نشط
                    </span>
                `;
                
                grid.appendChild(card);
            });
        }

        // إعدادات الأزرار
        function setupButtons() {
            // زر التيليجرام
            document.getElementById('telegramLink').onclick = (e) => {
                e.preventDefault();
                window.open('https://t.me/a_73a3', '_blank');
                showToast('جاري فتح قناة التليجرام...', 'success');
            };
            
            // أزرار المودال
            document.getElementById('submitBtn').onclick = () => {
                const input = document.getElementById('modalInput').value;
                if (currentModalCallback) {
                    currentModalCallback(input);
                }
            };
            
            document.getElementById('cancelBtn').onclick = closeModal;
            
            // إغلاق المودال عند الضغط خارج المحتوى
            document.getElementById('inputModal').onclick = (e) => {
                if (e.target === document.getElementById('inputModal')) {
                    closeModal();
                }
            };
            
            // الضغط على Enter في حقل الإدخال
            document.getElementById('modalInput').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('submitBtn').click();
                }
            };
        }

        // تأثيرات إضافية
        function addEffects() {
            // إضافة تأثير التمرير على البطاقات
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);
            
            document.querySelectorAll('.service-card, .profile-card').forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'all 0.6s ease';
                observer.observe(el);
            });
        }

        // تهيئة التطبيق
        function init() {
            renderServices();
            setupButtons();
            addEffects();
            showToast('✨ مرحباً بك في IDLEB X | تم تجهيز الخدمات بنجاح', 'success');
        }
        
        // تشغيل التطبيق
        init();
    </script>
</body>
              </html>
